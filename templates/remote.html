<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Dashboard — Remote</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#111; color:#fff; padding:20px; max-width:480px; margin:0 auto; }
        h1 { font-size:20px; font-weight:600; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
        .section { background:rgba(255,255,255,0.05); border-radius:12px; padding:16px; margin-bottom:16px; }
        .section h2 { font-size:13px; font-weight:600; opacity:0.5; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
        .btn-row { display:flex; gap:8px; flex-wrap:wrap; }
        .btn { padding:12px 16px; border-radius:10px; border:none; background:rgba(255,255,255,0.1); color:#fff; font-size:13px; font-family:'Inter',sans-serif; cursor:pointer; display:flex; align-items:center; gap:8px; transition:background 0.2s; flex:1; justify-content:center; min-width:0; }
        .btn:hover { background:rgba(255,255,255,0.18); }
        .btn:active { background:rgba(255,255,255,0.25); }
        .btn-primary { background:#4285f4; }
        .btn-primary:hover { background:#5a95f5; }
        .btn-danger { background:rgba(234,67,53,0.2); color:#ea4335; }
        textarea { width:100%; padding:12px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:#fff; font-size:14px; font-family:'Inter',sans-serif; resize:none; outline:none; margin-bottom:8px; }
        textarea::placeholder { color:rgba(255,255,255,0.25); }
        input[type="text"] { width:100%; padding:10px 12px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; font-size:14px; font-family:'Inter',sans-serif; outline:none; margin-bottom:8px; }
        select { padding:10px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; font-size:14px; outline:none; }
        .note-item { padding:10px 12px; background:rgba(255,255,255,0.03); border-radius:8px; margin-bottom:6px; font-size:13px; display:flex; justify-content:space-between; align-items:center; }
        .note-item small { opacity:0.4; }
        .note-delete { background:none; border:none; color:rgba(255,255,255,0.2); cursor:pointer; font-size:12px; padding:4px 8px; }
        .note-delete:hover { color:#ea4335; }
        .status-bar { display:flex; justify-content:space-between; align-items:center; font-size:11px; opacity:0.3; margin-top:16px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.06); }
        .music-search { display:flex; gap:8px; margin-bottom:8px; }
        .music-search input { flex:1; }
        .music-result { padding:10px; background:rgba(255,255,255,0.03); border-radius:8px; margin-bottom:4px; cursor:pointer; font-size:13px; }
        .music-result:hover { background:rgba(255,255,255,0.08); }
        .now-playing { padding:10px 12px; background:rgba(102,126,234,0.1); border:1px solid rgba(102,126,234,0.2); border-radius:8px; margin-bottom:10px; font-size:13px; }
    </style>
</head>
<body>
    <h1><i class="fas fa-mobile-alt"></i> Family Dashboard Remote</h1>

    <div class="section">
        <h2><i class="fas fa-images"></i> Slideshow</h2>
        <div class="btn-row">
            <button class="btn" id="btn-prev"><i class="fas fa-backward"></i> Prev</button>
            <button class="btn" id="btn-pause"><i class="fas fa-pause"></i> Pause</button>
            <button class="btn" id="btn-play"><i class="fas fa-play"></i> Play</button>
            <button class="btn" id="btn-next"><i class="fas fa-forward"></i> Next</button>
        </div>
        <div class="btn-row" style="margin-top:8px;">
            <button class="btn" id="btn-rescan"><i class="fas fa-sync-alt"></i> Rescan</button>
        </div>
    </div>

    <div class="section">
        <h2><i class="fas fa-volume-up"></i> Volume</h2>
        <div style="display:flex;align-items:center;gap:12px;">
            <i class="fas fa-volume-down" style="opacity:0.4;"></i>
            <input type="range" id="r-volume" min="0" max="100" value="50" style="flex:1;height:6px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.15);border-radius:3px;outline:none;">
            <i class="fas fa-volume-up" style="opacity:0.4;"></i>
            <span id="r-volume-val" style="min-width:32px;text-align:right;font-size:13px;opacity:0.6;">50%</span>
        </div>
    </div>

    <div class="section">
        <h2><i class="fas fa-music"></i> Music</h2>
        <div id="now-playing" class="now-playing" style="display:none;">🎵 <span id="np-text">Nothing playing</span></div>
        <div class="music-search">
            <input type="text" id="music-query" placeholder="Search songs...">
            <button class="btn btn-primary" id="btn-music-search" style="flex:0;padding:10px 16px;"><i class="fas fa-search"></i></button>
        </div>
        <div id="music-results"></div>
        <div class="btn-row" style="margin-top:8px;">
            <button class="btn" id="btn-music-prev"><i class="fas fa-backward-step"></i></button>
            <button class="btn" id="btn-music-play"><i class="fas fa-play"></i></button>
            <button class="btn" id="btn-music-pause"><i class="fas fa-pause"></i></button>
            <button class="btn" id="btn-music-next"><i class="fas fa-forward-step"></i></button>
        </div>
    </div>

    <div class="section">
        <h2><i class="fas fa-sticky-note"></i> Notes</h2>
        <textarea id="r-note-text" rows="2" placeholder="Write a note..."></textarea>
        <div style="display:flex;gap:8px;">
            <input type="text" id="r-note-author" placeholder="Your name" style="flex:1;">
            <select id="r-note-color">
                <option value="#fbbc04">🟡</option><option value="#4285f4">🔵</option>
                <option value="#34a853">🟢</option><option value="#ea4335">🔴</option>
                <option value="#a259ff">🟣</option>
            </select>
            <button class="btn btn-primary" id="btn-post-note" style="flex:0;padding:10px 16px;"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div id="r-notes-list" style="margin-top:12px;"></div>
    </div>

    <div class="section">
        <h2><i class="fas fa-th-large"></i> Dashboard</h2>
        <div class="btn-row">
            <button class="btn" id="btn-show-calendar"><i class="fas fa-calendar"></i> Calendar</button>
            <button class="btn" id="btn-show-weather"><i class="fas fa-cloud-sun"></i> Weather</button>
            <button class="btn" id="btn-show-notes"><i class="fas fa-sticky-note"></i> Notes</button>
        </div>
        <div class="btn-row" style="margin-top:8px;">
            <button class="btn" id="btn-close-panels"><i class="fas fa-times"></i> Close Panels</button>
            <button class="btn" id="btn-mute"><i class="fas fa-volume-mute"></i> Mute</button>
            <button class="btn" id="btn-unmute"><i class="fas fa-volume-up"></i> Unmute</button>
        </div>
    </div>

    <div class="status-bar">
        <span>Connected to <span id="r-host"></span></span>
        <span id="photo-count"></span>
    </div>

    <script>
        const host = window.location.host;
        document.getElementById("r-host").textContent = host;

        // Helper
        async function api(url, opts) {
            try { const r = await fetch(url, opts); return await r.json(); } catch { return null; }
        }
        async function postAction(action) {
            // Use voice endpoint to trigger actions on the dashboard
            await api("/api/voice", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({text: action}) });
        }

        // Slideshow
        document.getElementById("btn-next").addEventListener("click", () => postAction("next photo"));
        document.getElementById("btn-prev").addEventListener("click", () => postAction("previous photo"));
        document.getElementById("btn-pause").addEventListener("click", () => postAction("pause slideshow"));
        document.getElementById("btn-play").addEventListener("click", () => postAction("resume slideshow"));
        document.getElementById("btn-rescan").addEventListener("click", () => api("/api/photos/scan", {method:"POST"}));

        // Volume
        const volSlider = document.getElementById("r-volume");
        const volVal = document.getElementById("r-volume-val");
        api("/api/volume").then(data => {
            if (data && data.volume !== undefined) { volSlider.value = data.volume; volVal.textContent = data.volume + "%"; }
        });
        let volDebounce = null;
        volSlider.addEventListener("input", () => {
            volVal.textContent = volSlider.value + "%";
            clearTimeout(volDebounce);
            volDebounce = setTimeout(() => {
                api("/api/volume", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({volume: parseInt(volSlider.value)}) });
            }, 150);
        });

        // Music search
        document.getElementById("btn-music-search").addEventListener("click", async () => {
            const q = document.getElementById("music-query").value.trim();
            if (!q) return;
            const data = await api(`/api/youtube/search?q=${encodeURIComponent(q)}`);
            const el = document.getElementById("music-results");
            if (!data || !data.results || !data.results.length) { el.innerHTML = '<div style="opacity:0.3;font-size:12px;padding:8px;">No results</div>'; return; }
            el.innerHTML = data.results.map(r =>
                `<div class="music-result" data-vid="${r.videoId}" data-title="${r.title}">${r.title} <small style="opacity:0.4;">— ${r.channel}</small></div>`
            ).join("");
            el.querySelectorAll(".music-result").forEach(item => {
                item.addEventListener("click", () => {
                    postAction(`play ${item.dataset.title}`);
                    document.getElementById("now-playing").style.display = "block";
                    document.getElementById("np-text").textContent = item.dataset.title;
                    document.getElementById("music-query").value = "";
                    el.innerHTML = "";
                });
            });
        });
        // Music enter key
        document.getElementById("music-query").addEventListener("keydown", e => {
            if (e.key === "Enter") document.getElementById("btn-music-search").click();
        });

        // Music controls
        document.getElementById("btn-music-play").addEventListener("click", () => postAction("resume music"));
        document.getElementById("btn-music-pause").addEventListener("click", () => postAction("pause"));
        document.getElementById("btn-music-next").addEventListener("click", () => postAction("next song"));
        document.getElementById("btn-music-prev").addEventListener("click", () => postAction("next song")); // No prev in queue

        // Dashboard controls
        document.getElementById("btn-show-calendar").addEventListener("click", () => postAction("show calendar"));
        document.getElementById("btn-show-weather").addEventListener("click", () => postAction("show weather"));
        document.getElementById("btn-show-notes").addEventListener("click", () => postAction("show notes"));
        document.getElementById("btn-close-panels").addEventListener("click", () => postAction("close"));
        document.getElementById("btn-mute").addEventListener("click", () => postAction("mute"));
        document.getElementById("btn-unmute").addEventListener("click", () => postAction("unmute"));

        // Notes
        document.getElementById("btn-post-note").addEventListener("click", async () => {
            const text = document.getElementById("r-note-text").value.trim();
            if (!text) return;
            await api("/api/notes", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({
                    text,
                    author: document.getElementById("r-note-author").value || "Phone",
                    color: document.getElementById("r-note-color").value
                })
            });
            document.getElementById("r-note-text").value = "";
            loadNotes();
        });

        async function loadNotes() {
            const data = await api("/api/notes");
            const list = document.getElementById("r-notes-list");
            if (!data || !data.notes) { list.innerHTML = ""; return; }
            list.innerHTML = data.notes.map(n =>
                `<div class="note-item"><span>${n.text} <small>— ${n.author}</small></span><button class="note-delete" data-id="${n.id}"><i class="fas fa-trash"></i></button></div>`
            ).join("");
            list.querySelectorAll(".note-delete").forEach(btn => {
                btn.addEventListener("click", async () => {
                    await api(`/api/notes/${btn.dataset.id}`, {method:"DELETE"});
                    loadNotes();
                });
            });
        }

        // Load initial data
        loadNotes();
        api("/api/photos").then(data => {
            if (data && data.photos) {
                const imgs = data.photos.filter(p => p.type !== "video").length;
                const vids = data.photos.filter(p => p.type === "video").length;
                document.getElementById("photo-count").textContent = `${imgs} photos, ${vids} videos`;
            }
        });
    </script>
</body>
</html>
